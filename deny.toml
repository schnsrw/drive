# cargo-deny configuration — see https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# RUSTSEC-2023-0071 (RSA Marvin Attack) is reachable only via sqlx-mysql,
# which we do not enable. We never construct a MySQL pool.
ignore = ["RUSTSEC-2023-0071"]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "OpenSSL",
    # tiny-keccak (transitive via opendal → reqsign → rust-ini → ...) is CC0.
    # CC0 is a permissive public-domain dedication, OSI-recognized via review.
    "CC0-1.0",
]
confidence-threshold = 0.93
exceptions = []

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
# The `radix-ui` umbrella crate re-exports its sub-packages via wildcard
# version specs — that's the upstream-recommended consumption pattern.
# Demote to warn so cargo deny gates on real wildcards from our own crates.
wildcards = "warn"
highlight = "all"
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
