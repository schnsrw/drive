name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  web-build:
    # Compiles the SPA so downstream cargo jobs can embed web/dist via
    # rust-embed. web/dist is gitignored, so without this every cargo
    # job would fail at macro-expansion time.
    name: build SPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - working-directory: web
        run: pnpm install --frozen-lockfile
      - working-directory: web
        run: pnpm build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 1

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -Dwarnings

  test:
    name: test (workspace)
    runs-on: ubuntu-latest
    needs: web-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  spikes:
    name: test (spikes)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: spike 01 — storage
        working-directory: spikes/01-storage
        run: cargo test
      - name: spike 02 — wopi-host
        working-directory: spikes/02-wopi-host
        run: cargo test
      - name: spike 04 — two-origin
        working-directory: spikes/04-two-origin
        run: cargo test

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked
      # Mirror deny.toml's ignore set — the RSA Marvin Attack advisory is
      # reachable only via sqlx-mysql, which we do not enable.
      - run: cargo audit --deny warnings --ignore RUSTSEC-2023-0071

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-deny --locked
      - run: cargo deny check

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: casual-drive:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
