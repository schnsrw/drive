<svg viewBox="0 0 172 172" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Casual Drive mark</title>
  <desc>The Casual Drive mark on its own — a rounded square with a negative-space crescent moon, intended for chrome, favicons, and inline use.</desc>

  <defs>
    <clipPath id="cd-mark-only-clip">
      <rect x="0" y="0" width="172" height="172" rx="40"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cd-mark-only-clip)">
    <rect width="172" height="172" fill="currentColor"/>
    <circle cx="78"  cy="86" r="52"  fill="var(--mark-fg, #F5F3EE)"/>
    <circle cx="104" cy="72" r="52"  fill="currentColor"/>
    <circle cx="112" cy="64" r="6.5" fill="var(--mark-fg, #F5F3EE)"/>
  </g>
</svg>
